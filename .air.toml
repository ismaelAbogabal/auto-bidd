root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/main"
  cmd = "go build -o ./tmp/main ./cmd/server"
  delay = 1000
  exclude_dir = ["tmp", "static", "node_modules"]
  exclude_regex = ["_test.go"]
  include_ext = ["go", "html"]
  kill_delay = "0s"
  send_interrupt = false
  stop_on_error = true

[misc]
  clean_on_exit = true

{{define "bid_output"}}
<div id="bid-output" class="bg-white rounded-lg shadow p-6" x-data="{ editing: false }">
    <div class="flex items-center justify-between mb-3">
        <h2 class="text-lg font-semibold text-gray-900">Cover Letter</h2>
        <button @click="editing = !editing"
            class="text-sm text-indigo-600 hover:text-indigo-700"
            x-text="editing ? 'Cancel' : 'Edit'"></button>
    </div>

    <div x-show="!editing">
        <div class="prose prose-sm max-w-none text-gray-700 whitespace-pre-wrap">{{.Bid.CoverLetter}}</div>
    </div>

    <div x-show="editing">
        <form hx-put="/api/bids/{{.Bid.ID}}" hx-target="#bid-output" hx-swap="outerHTML">
            <textarea name="cover_letter" rows="10"
                class="block w-full px-3 py-2 border border-gray-300 rounded-md text-sm">{{.Bid.CoverLetter}}</textarea>
            <input type="hidden" name="estimated_hours" value="{{.Bid.EstimatedHours}}">
            <input type="hidden" name="hourly_rate" value="{{printf "%.2f" .Bid.HourlyRate}}">
            <button type="submit"
                class="mt-3 px-4 py-2 bg-indigo-600 text-white text-sm rounded-md hover:bg-indigo-700">
                Save Changes
            </button>
        </form>
    </div>
</div>
{{end}}

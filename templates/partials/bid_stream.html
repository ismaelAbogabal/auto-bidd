{{define "bid_stream"}}
<div class="mt-6" x-data="bidStream('{{.Endpoint}}', {{.HourlyRate}})">

    <!-- Status bar -->
    <div class="mb-4">
        <div x-show="!done && !error" class="flex items-center gap-2 text-indigo-600">
            <div class="animate-spin h-4 w-4 border-2 border-indigo-600 border-t-transparent rounded-full"></div>
            <span class="text-sm font-medium">Generating your bid...</span>
        </div>
        <div x-show="done" class="flex items-center gap-2 text-green-600">
            <svg class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z" clip-rule="evenodd"/></svg>
            <span class="text-sm font-medium">Done! Redirecting to your bid...</span>
        </div>
        <div x-show="error" class="flex items-center gap-2 text-red-600">
            <svg class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z" clip-rule="evenodd"/></svg>
            <span class="text-sm font-medium" x-text="error"></span>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Main Content (2/3) -->
        <div class="lg:col-span-2 space-y-6">

            <!-- Cover Letter -->
            <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-lg font-semibold text-gray-900 mb-3">Cover Letter</h2>

                <!-- Skeleton -->
                <div x-show="!coverLetter" class="space-y-3 animate-pulse">
                    <div class="h-4 bg-gray-200 rounded w-full"></div>
                    <div class="h-4 bg-gray-200 rounded w-11/12"></div>
                    <div class="h-4 bg-gray-200 rounded w-full"></div>
                    <div class="h-4 bg-gray-200 rounded w-9/12"></div>
                    <div class="h-4 bg-gray-200 rounded w-full"></div>
                    <div class="h-4 bg-gray-200 rounded w-10/12"></div>
                    <div class="h-4 bg-gray-200 rounded w-full"></div>
                    <div class="h-4 bg-gray-200 rounded w-7/12"></div>
                </div>

                <!-- Streamed content -->
                <div x-show="coverLetter" class="prose prose-sm max-w-none text-gray-700 whitespace-pre-wrap" x-text="coverLetter"></div>

                <!-- Typing cursor -->
                <span x-show="coverLetter && !done && !metaParsed" class="inline-block w-2 h-5 bg-indigo-500 animate-pulse ml-0.5 align-text-bottom"></span>
            </div>

            <!-- Q&A Answers -->
            <div x-show="qaAnswers.length > 0" class="bg-white rounded-lg shadow p-6" x-transition>
                <h2 class="text-lg font-semibold text-gray-900 mb-3">Q&A Answers</h2>
                <div class="space-y-4">
                    <template x-for="qa in qaAnswers" :key="qa.question">
                        <div>
                            <p class="text-sm font-medium text-gray-700" x-text="'Q: ' + qa.question"></p>
                            <p class="text-sm text-gray-600 mt-1 whitespace-pre-wrap" x-text="qa.answer"></p>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Q&A Skeleton -->
            <div x-show="!metaParsed && !done" class="bg-white rounded-lg shadow p-6 animate-pulse">
                <div class="h-5 bg-gray-200 rounded w-32 mb-4"></div>
                <div class="space-y-4">
                    <div>
                        <div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div>
                        <div class="h-4 bg-gray-100 rounded w-full"></div>
                        <div class="h-4 bg-gray-100 rounded w-10/12 mt-1"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sidebar (1/3) -->
        <div class="space-y-6">

            <!-- Pricing -->
            <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-lg font-semibold text-gray-900 mb-3">Pricing</h2>
                <div class="space-y-3">
                    <div class="flex justify-between text-sm">
                        <span class="text-gray-600">Estimated Hours</span>
                        <!-- Skeleton -->
                        <span x-show="!metaParsed" class="h-4 w-10 bg-gray-200 rounded animate-pulse"></span>
                        <span x-show="metaParsed" class="font-medium" x-text="hours + 'h'"></span>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-gray-600">Hourly Rate</span>
                        <span class="font-medium" x-text="'$' + rate"></span>
                    </div>
                    <div class="border-t pt-3 flex justify-between">
                        <span class="font-medium text-gray-900">Total</span>
                        <!-- Skeleton -->
                        <span x-show="!metaParsed" class="h-6 w-20 bg-gray-200 rounded animate-pulse"></span>
                        <span x-show="metaParsed" class="font-bold text-lg text-indigo-600" x-text="'$' + total.toLocaleString()"></span>
                    </div>
                </div>
            </div>

            <!-- Reasoning -->
            <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-lg font-semibold text-gray-900 mb-3">Estimate Reasoning</h2>
                <!-- Skeleton -->
                <div x-show="!metaParsed" class="space-y-2 animate-pulse">
                    <div class="h-4 bg-gray-200 rounded w-full"></div>
                    <div class="h-4 bg-gray-200 rounded w-9/12"></div>
                    <div class="h-4 bg-gray-200 rounded w-10/12"></div>
                </div>
                <p x-show="metaParsed" class="text-sm text-gray-600" x-text="reasoning"></p>
            </div>
        </div>
    </div>
</div>
{{end}}

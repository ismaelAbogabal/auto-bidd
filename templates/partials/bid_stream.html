{{define "bid_stream"}}
<div class="bg-white rounded-lg shadow p-6 mt-4"
    x-data="bidStream('{{.Endpoint}}')">
    <div class="flex items-center gap-2 mb-4">
        <div x-show="!done && !error" class="flex items-center gap-2">
            <div class="animate-spin h-4 w-4 border-2 border-indigo-600 border-t-transparent rounded-full"></div>
            <span class="text-sm text-gray-500">Generating your bid...</span>
        </div>
        <div x-show="done" class="flex items-center gap-2 text-green-600">
            <span class="text-sm font-medium">Done! Redirecting...</span>
        </div>
        <div x-show="error" class="flex items-center gap-2 text-red-600">
            <span class="text-sm font-medium" x-text="'Error: ' + error"></span>
        </div>
    </div>
    <div class="prose prose-sm max-w-none text-gray-700 whitespace-pre-wrap" x-text="text"></div>
</div>
{{end}}

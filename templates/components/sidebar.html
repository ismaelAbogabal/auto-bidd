{{define "sidebar"}}
<!-- Mobile header -->
<div class="lg:hidden fixed top-0 left-0 right-0 z-30 bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between">
    <h1 class="text-lg font-bold text-gray-900">Auto-Bidder</h1>
    <button @click="$store.sidebar.open = !$store.sidebar.open" class="p-1.5 rounded-md text-gray-500 hover:bg-gray-100">
        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path x-show="!$store.sidebar.open" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            <path x-show="$store.sidebar.open" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
    </button>
</div>

<!-- Overlay -->
<div x-show="$store.sidebar.open" @click="$store.sidebar.open = false"
    class="lg:hidden fixed inset-0 z-30 bg-black/50" x-transition.opacity></div>

<!-- Sidebar -->
<aside :class="$store.sidebar.open ? 'translate-x-0' : '-translate-x-full'"
    class="fixed lg:static inset-y-0 left-0 z-40 w-64 bg-white border-r border-gray-200 flex flex-col transform transition-transform lg:translate-x-0">
    <div class="p-6 hidden lg:block">
        <h1 class="text-xl font-bold text-gray-900">Auto-Bidder</h1>
    </div>
    <div class="p-6 lg:hidden"></div>
    <nav class="flex-1 px-4 space-y-1" @click="$store.sidebar.open = false">
        <a href="/" class="flex items-center px-3 py-2 text-sm font-medium rounded-md text-gray-700 hover:bg-gray-100">
            Dashboard
        </a>
        <a href="/bids" class="flex items-center px-3 py-2 text-sm font-medium rounded-md text-gray-700 hover:bg-gray-100">
            Bids
        </a>
        <a href="/bids/new" class="flex items-center px-3 py-2 text-sm font-medium rounded-md text-gray-700 hover:bg-gray-100">
            New Bid
        </a>
        <a href="/templates" class="flex items-center px-3 py-2 text-sm font-medium rounded-md text-gray-700 hover:bg-gray-100">
            Templates
        </a>
        <a href="/analytics" class="flex items-center px-3 py-2 text-sm font-medium rounded-md text-gray-700 hover:bg-gray-100">
            Analytics
        </a>
        <a href="/profile" class="flex items-center px-3 py-2 text-sm font-medium rounded-md text-gray-700 hover:bg-gray-100">
            Profile
        </a>
    </nav>
    <div class="p-4 border-t border-gray-200">
        <form hx-post="/auth/logout" hx-swap="none">
            <button type="submit" class="text-sm text-gray-500 hover:text-gray-700">Logout</button>
        </form>
    </div>
</aside>
{{end}}
